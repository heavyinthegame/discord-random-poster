name: Random Discord Poster

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      force_post:
        description: "Post immediately, then schedule the next random post"
        required: false
        default: false
        type: boolean

concurrency:
  group: random-discord-poster
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run scheduled poster
        run: npm run post:scheduled
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          MIN_INTERVAL_MINUTES: "360"
          MAX_INTERVAL_MINUTES: "900"
          POST_ON_STARTUP: "false"
          FORCE_POST: ${{ inputs.force_post }}

      - name: Commit poster state
        run: |
          if git diff --quiet -- .poster-state.json; then
            echo "No poster state changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .poster-state.json
            git commit -m "Update poster schedule state"
            git push
          fi
